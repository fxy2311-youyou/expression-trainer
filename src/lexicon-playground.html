<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>词库 Playground — 分层替换卡片测试</title>
<style>
:root {
  --green: #45A020;
  --yellow: #FFD000;
  --magenta: #E5007E;
  --bg: #F8FFF5;
  --ink: #2A2A2A;
  --ink-light: #6A6A6A;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, 'PingFang SC', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  padding: 40px;
  color: var(--ink);
}

h1 {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 8px;
}

.subtitle {
  color: var(--ink-light);
  font-size: 14px;
  margin-bottom: 32px;
}

.main-layout {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 32px;
  max-width: 1200px;
}

/* 左侧：输入区 */
.input-area {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.input-area textarea {
  width: 100%;
  min-height: 200px;
  padding: 20px;
  border: 2px solid #e0e0e0;
  border-radius: 12px;
  font-size: 16px;
  line-height: 1.8;
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
}

.input-area textarea:focus {
  border-color: var(--green);
}

.input-area .hint {
  font-size: 13px;
  color: var(--ink-light);
}

/* 高亮输出区 */
.output-area {
  background: #fff;
  border-radius: 12px;
  padding: 24px;
  min-height: 200px;
  line-height: 2;
  font-size: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  border: 1px solid #e8e8e8;
}

.output-area .highlight {
  background: rgba(69, 160, 32, 0.15);
  color: var(--green);
  padding: 2px 4px;
  border-radius: 4px;
  cursor: pointer;
  font-weight: 600;
  position: relative;
  transition: background 0.2s;
}

.output-area .highlight:hover {
  background: rgba(69, 160, 32, 0.25);
}

.output-area .highlight-filler {
  background: rgba(255, 208, 0, 0.2);
  color: #B8860B;
  padding: 2px 4px;
  border-radius: 4px;
  font-weight: 500;
}

.output-area .highlight-hedge {
  background: rgba(229, 0, 126, 0.12);
  color: var(--magenta);
  padding: 2px 4px;
  border-radius: 4px;
  font-weight: 500;
}

/* 右侧：替换卡片 */
.card-panel {
  position: sticky;
  top: 40px;
}

.card-panel h2 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--ink-light);
}

.replacement-card {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  border: 1px solid #e8e8e8;
  margin-bottom: 12px;
  animation: slideIn 0.2s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.replacement-card .original {
  font-size: 13px;
  color: var(--ink-light);
  margin-bottom: 8px;
}

.replacement-card .word {
  font-size: 20px;
  font-weight: 700;
  color: var(--green);
  margin-bottom: 12px;
}

.replacement-card .category {
  font-size: 12px;
  color: #999;
  margin-bottom: 12px;
  padding: 2px 8px;
  background: #f5f5f5;
  border-radius: 4px;
  display: inline-block;
}

.replacement-card .alternatives {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.replacement-card .alt-chip {
  padding: 6px 14px;
  background: var(--bg);
  border: 1px solid rgba(69, 160, 32, 0.3);
  border-radius: 20px;
  font-size: 14px;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.2s;
}

.replacement-card .alt-chip:hover {
  background: var(--green);
  color: #fff;
  border-color: var(--green);
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #ccc;
  font-size: 14px;
}

/* 统计栏 */
.stats-bar {
  display: flex;
  gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid #eee;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--ink-light);
}

.stats-bar .stat {
  display: flex;
  align-items: center;
  gap: 6px;
}

.stats-bar .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}

.stats-bar .dot-green { background: var(--green); }
.stats-bar .dot-yellow { background: var(--yellow); }
.stats-bar .dot-magenta { background: var(--magenta); }

/* 词库浏览 */
.lexicon-browser {
  margin-top: 40px;
  padding-top: 32px;
  border-top: 2px solid #eee;
}

.lexicon-browser h2 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
}

.category-section {
  margin-bottom: 24px;
}

.category-section h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--green);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid #eee;
}

.word-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px;
}

.word-item {
  font-size: 13px;
  padding: 8px 12px;
  background: #fff;
  border-radius: 8px;
  border: 1px solid #eee;
}

.word-item .w-word {
  font-weight: 600;
  color: var(--ink);
}

.word-item .w-arrow {
  color: #ccc;
  margin: 0 6px;
}

.word-item .w-alts {
  color: var(--ink-light);
  font-size: 12px;
}
</style>
</head>
<body>

<h1>🧪 词库 Playground</h1>
<p class="subtitle">在下面输入或粘贴你的口播稿/录音逐字稿，实时看到哪些词会被高亮，以及会弹出什么替换建议。</p>

<div class="stats-bar" id="stats">
  <div class="stat"><div class="dot dot-green"></div>笼统词: <span id="stat-vague">0</span></div>

</div>

<div class="main-layout">
  <div class="input-area">
    <textarea id="input" placeholder="在这里输入或粘贴你的口语内容...&#10;&#10;比如：我觉得今天挺开心的，感觉做了很多事情，然后嗯就是特别满足。"></textarea>
    <div class="hint">💡 绿色 = 笼统词（有替换建议） · 黄色 = 填充词 · 粉色 = 犹豫词。点击绿色词看替换卡片。</div>
    <div class="output-area" id="output">
      <span style="color:#ccc">输入内容后这里会实时显示高亮...</span>
    </div>
  </div>

  <div class="card-panel">
    <h2>替换卡片</h2>
    <div id="cards">
      <div class="empty-state">👈 点击左侧绿色词查看替换建议</div>
    </div>
  </div>
</div>

<!-- 词库完整浏览 -->
<div class="lexicon-browser">
  <h2>📖 完整词库一览（第一层 97词 + 第二层替换）</h2>
  <div id="lexicon-list"></div>
</div>

  'emotions_negative': '负面情绪',

for (const [cat, words] of Object.entries(TIERED_LEXICON)) {
  if (cat === '_meta') continue;
  for (const [word, alts] of Object.entries(words)) {
    tier1Map[word] = { alternatives: alts, category: CATEGORY_NAMES[cat] || cat };
  }
}

// ===== 实时高亮 =====
const input = document.getElementById('input');
const output = document.getElementById('output');
const cardsDiv = document.getElementById('cards');
const HIGHLIGHT_PATTERNS = [
  ...Object.keys(tier1Map).map(word => ({ word, className: 'highlight', type: 'vague', priority: 0 })),
  ...FILLER_WORDS.map(word => ({ word, className: 'highlight-filler', type: 'filler', priority: 1 })),
  ...HEDGE_WORDS.map(word => ({ word, className: 'highlight-hedge', type: 'hedge', priority: 2 }))
].sort((a, b) => b.word.length - a.word.length || a.priority - b.priority);

function createTextElement(tagName, className, text) {
  const element = document.createElement(tagName);
  if (className) element.className = className;
  element.textContent = text;
  return element;
}

function appendTextWithBreaks(container, text) {
  const parts = String(text).split('\n');
  parts.forEach((part, index) => {
    if (part) container.appendChild(document.createTextNode(part));
    if (index < parts.length - 1) container.appendChild(document.createElement('br'));
  });
}

input.addEventListener('input', () => {
  const text = input.value;
  if (!text.trim()) {
    const placeholder = createTextElement('span', '', '输入内容后这里会实时显示高亮...');
    placeholder.style.color = '#ccc';
    output.replaceChildren(placeholder);
    document.getElementById('stat-vague').textContent = '0';
    document.getElementById('stat-filler').textContent = '0';
    document.getElementById('stat-hedge').textContent = '0';
    return;
  }

  const fragment = document.createDocumentFragment();
  const counts = { vague: 0, filler: 0, hedge: 0 };
  let cursor = 0;
  let plainStart = 0;

  while (cursor < text.length) {
    const matched = HIGHLIGHT_PATTERNS.find(item => text.startsWith(item.word, cursor));
    if (!matched) {
      cursor += 1;
      continue;
    }

    if (cursor > plainStart) {
      appendTextWithBreaks(fragment, text.slice(plainStart, cursor));
    }

    const span = createTextElement('span', matched.className, matched.word);
    if (matched.type === 'vague') {
      span.dataset.word = matched.word;
      span.addEventListener('click', () => showCard(matched.word));
    }
    fragment.appendChild(span);
    counts[matched.type] += 1;

    cursor += matched.word.length;
    plainStart = cursor;
  }

  if (plainStart < text.length) {
    appendTextWithBreaks(fragment, text.slice(plainStart));
  }

  output.replaceChildren(fragment);
  document.getElementById('stat-vague').textContent = counts.vague;
  document.getElementById('stat-filler').textContent = counts.filler;
  document.getElementById('stat-hedge').textContent = counts.hedge;
});

// ===== 替换卡片 =====
function showCard(word) {
  const info = tier1Map[word];
  if (!info) return;

  const card = document.createElement('div');
  card.className = 'replacement-card';
  card.appendChild(createTextElement('div', 'original', '你说了：'));
  card.appendChild(createTextElement('div', 'word', `「${word}」`));
  card.appendChild(createTextElement('div', 'category', info.category));

  const alternatives = document.createElement('div');
  alternatives.className = 'alternatives';
  info.alternatives.forEach(alt => {
    alternatives.appendChild(createTextElement('span', 'alt-chip', alt));
  });
  card.appendChild(alternatives);
  cardsDiv.replaceChildren(card);
}

// ===== 词库浏览 =====
function renderLexiconBrowser() {
  const container = document.getElementById('lexicon-list');
  const fragment = document.createDocumentFragment();

  for (const [cat, words] of Object.entries(TIERED_LEXICON)) {
    if (cat === '_meta') continue;
    const catName = CATEGORY_NAMES[cat] || cat;

    const section = document.createElement('div');
    section.className = 'category-section';
    section.appendChild(createTextElement('h3', '', `${catName}（${Object.keys(words).length}词）`));

    const grid = document.createElement('div');
    grid.className = 'word-grid';
    for (const [word, alts] of Object.entries(words)) {
      const item = document.createElement('div');
      item.className = 'word-item';
      item.appendChild(createTextElement('span', 'w-word', word));
      item.appendChild(createTextElement('span', 'w-arrow', '→'));
      item.appendChild(createTextElement('span', 'w-alts', alts.slice(0, 3).join(' / ')));
      grid.appendChild(item);
    }

    section.appendChild(grid);
    fragment.appendChild(section);
  }

  container.replaceChildren(fragment);
}

renderLexiconBrowser();
</script>
